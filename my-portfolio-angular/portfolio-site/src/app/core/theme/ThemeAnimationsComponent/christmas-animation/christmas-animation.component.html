<div class="christmas-wrapper" *ngIf="isChristmas()" [class.animations-disabled]="!showAnimations()">
  
  <button class="snow-toggle" (click)="toggleAnimations()" [title]="showAnimations() ? 'Disable FX' : 'Enable FX'">
    <span *ngIf="showAnimations()">❄️</span>
    <span *ngIf="!showAnimations()">✨</span>
  </button>

  <ng-container *ngIf="showAnimations()">
    <div class="sleigh-path">
      <div class="sleigh-wrap">
        <div class="sleigh">🛷</div>
        <div class="reindeer">🦌🦌</div>
      </div>
    </div>

    <div class="hanging-lights">
      <span *ngFor="let i of [1,2,3,4,5,6,7,8,9,0]" class="bulb"></span>
    </div>

    <div class="snow-layer near"></div>
    <div class="snow-layer far"></div>
  </ng-container>

  <div class="gift-container">
    <div class="gift gift-primary"></div>
    <div class="gift gift-accent"></div>
    <div class="gift gift-warn"></div>
  </div>
</div>
