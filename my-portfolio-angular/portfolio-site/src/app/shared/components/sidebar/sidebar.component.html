<!-- Menu side bar -->
<div class="sidebar-container" [class.collapsed]="config.appConfiguration.collapsed" [class.open]="isMobileOpen"
  [ngClass]="{
      'none': config.appConfiguration.type === 'sidebar' && isMobile && config.appConfiguration.collapsed,
      '': config.appConfiguration.type === 'sidebar' && isMobile && !config.appConfiguration.collapsed,

    }" *ngIf="config.appConfiguration.type === 'sidebar'">
  <div class="sidebar-header">
    <button class="sidebar-collapse-btn" (click)="toggleSidebarCollapse()"
      *ngIf="config.appConfiguration.type === 'sidebar' && !config.appConfiguration.collapsed">
      <span class="material-icons">
        {{ 'close'}}
      </span>
    </button>
  </div>
  <div class="sidebar-menu" [class.collapsed]="config.appConfiguration.collapsed">
    <a *ngFor="let item of menuItems" [href]="item.href" class="menu-link" (click)="scrollToSection($event, item.href)">
      <span class="material-icons menu-icon">{{ item.icon }}</span>
      <span class="menu-label" *ngIf="!config.appConfiguration.collapsed">{{ item.label }}</span>
    </a>
    <a class="resume-download-btn" href="assets/Rohit.Nair.pdf" download>
      <span class="material-icons menu-icon">download</span>
      <span class="menu-label" *ngIf="!config.appConfiguration.collapsed">Resume</span>
    </a>
    <button class="theme-toggle" (click)="themeService.toggleDarkMode()">
      <span class="material-icons menu-icon">{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</span>
      <span class="menu-label" *ngIf="!config.appConfiguration.collapsed">Theme</span>
    </button>
  </div>
</div>

<!-- feature side bar, if require custom design can be made if required -->
<!-- Floating settings trigger -->
<div class="settings-trigger" *ngIf="config.appConfiguration.showSidebarToggle && !isRightSideSettingOpen">
  <button class="settings-trigger-btn" (click)="toggleSettingSideBar()" aria-label="Open settings">
    <span class="material-icons">settings</span>
  </button>
</div>

<!-- Settings drawer -->
<aside class="settings-panel" *ngIf="isRightSideSettingOpen">
  <header class="settings-header">
    <h3 class="settings-title">Preferences</h3>
    <button class="settings-close-btn" (click)="toggleSettingSideBar()" aria-label="Close settings">
      <span class="material-icons">close</span>
    </button>
  </header>

  <section class="settings-section">
    <p class="settings-description">
      Choose how you want to navigate through the application.
    </p>

    <div class="radio-group">
      <label class="radio-option">
        <p-radioButton name="navigationType" value="sidebar" [(ngModel)]="navigationType"
          (click)="onNavigationTypeChange('sidebar')">
        </p-radioButton>
        <span>Sidebar Navigation</span>
      </label>

      <label class="radio-option">
        <p-radioButton name="navigationType" value="navbar" [(ngModel)]="navigationType"
          (click)="onNavigationTypeChange('navbar')">
        </p-radioButton>
        <span>Top Navigation</span>
      </label>
    </div>
  </section>

  <section class="settings-section">
    <h4 class="section-title">Theme</h4>
    <p class="settings-description">
      Select a theme that suits your style.
    </p>

    <div class="theme-grid">
      <div *ngFor="let theme of availableThemes()" class="theme-card"
        [class.active]="themeService.currentThemeId() === theme.id" (click)="onThemeChange(theme)">

        <div class="theme-preview">
          <div class="color-dot" [style.background]="theme.tokens['primary']"></div>
          <div class="color-dot" [style.background]="theme.tokens['accent']"></div>
          <div class="color-dot shadow" [style.background]="theme.tokens['surface']"></div>
        </div>

        <div class="theme-info">
          <span class="theme-name">{{ theme.name }}</span>
          <i class="material-icons check-icon" *ngIf="themeService.currentThemeId() === theme.id">check_circle</i>
        </div>
      </div>
    </div>
  </section>
</aside>
