<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Reset password</h1>
      <p>Enter your new password below.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-field" [class.invalid]="password?.invalid && password?.touched">
        <label for="password">New password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="New password"
        />
        <div class="field-error" *ngIf="password?.errors && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required.</span>
          <span *ngIf="password?.errors?.['minlength']">Minimum 6 characters.</span>
        </div>
      </div>

      <div class="form-field" [class.invalid]="confirmPassword?.invalid && confirmPassword?.touched || form.errors?.['mismatch']">
        <label for="confirmPassword">Confirm password</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirm password"
        />
        <div class="field-error" *ngIf="confirmPassword?.errors && confirmPassword?.touched">
          <span *ngIf="confirmPassword?.errors?.['required']">Please confirm your password.</span>
        </div>
        <div class="field-error" *ngIf="form.errors?.['mismatch'] && confirmPassword?.touched">
          <span>Passwords do not match.</span>
        </div>
      </div>

      <button
        type="submit"
        class="btn primary w-100"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Reset password</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <p class="auth-footer-text">
        Back to
        <a class="link" [routerLink]="['/login']">Login</a>
      </p>

      <p *ngIf="successMessage" class="global-success">
        {{ successMessage }}
      </p>

      <p *ngIf="error" class="global-error">
        {{ error }}
      </p>
    </form>
  </div>
</div>
