<div class="auth-page">
  <div class="auth-card">
    
    <div class="auth-branding">
      <div class="logo-initials">
        <span class="rn-r">R</span><span class="rn-n">N</span>
      </div>
      <div class="auth-header">
        <h1>Secure Your Account</h1>
        <p>Enter a strong new password to regain access.</p>
      </div>
    </div>

    <div *ngIf="successMessage" class="success-state animate-fade-in">
      <div class="success-icon">
        <i class="material-icons">check_circle</i>
      </div>
      <h3>Password Updated</h3>
      <p>{{ successMessage }}</p>
      <button class="btn-primary-auth" [routerLink]="['/login']">Return to Login</button>
    </div>

    <form *ngIf="!successMessage" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">
      
      <div class="form-field" [class.invalid]="password?.invalid && password?.touched">
        <label for="password">New Password</label>
        <div class="input-wrapper">
          <i class="material-icons">lock_outline</i>
          <input id="password" type="password" formControlName="password" placeholder="••••••••" />
        </div>
        <div class="field-error" *ngIf="password?.errors && password?.touched">
          <small *ngIf="password?.errors?.['required']">Password is required</small>
          <small *ngIf="password?.errors?.['minlength']">Minimum 6 characters required</small>
        </div>
      </div>

      <div class="form-field" [class.invalid]="confirmPassword?.touched && form.errors?.['mismatch']">
        <label for="confirmPassword">Confirm New Password</label>
        <div class="input-wrapper">
          <i class="material-icons">verified_user</i>
          <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="••••••••" />
        </div>
        <div class="field-error" *ngIf="form.errors?.['mismatch'] && confirmPassword?.touched">
          <small>Passwords do not match</small>
        </div>
      </div>

      <button type="submit" class="btn-primary-auth" [disabled]="loading || form.invalid">
        <div *ngIf="!loading">Update Password</div>
        <div *ngIf="loading" class="spinner-container">
          <span class="auth-spinner"></span>
          <span>Updating...</span>
        </div>
      </button>

      <p class="auth-footer-text">
        Remembered your password? <a [routerLink]="['/login']">Back to Login</a>
      </p>
    </form>
  </div>
</div>
