<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Forgot password?</h1>
      <p>Enter your email and we’ll send you reset instructions.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-field" [class.invalid]="email?.invalid && email?.touched">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
        />
        <div class="field-error" *ngIf="email?.errors && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required.</span>
          <span *ngIf="email?.errors?.['email']">Enter a valid email.</span>
        </div>
      </div>

      <button
        type="submit"
        class="btn primary w-100"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Send reset link</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <p class="auth-footer-text">
        Back to
        <a class="link" [routerLink]="['/login']">Login</a>
      </p>

      <p *ngIf="successMessage" class="global-success">
        {{ successMessage }}
      </p>

      <p *ngIf="error" class="global-error">
        {{ error }}
      </p>
    </form>
  </div>
</div>
