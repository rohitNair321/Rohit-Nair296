<div class="auth-page">
  <div class="auth-card">
    
    <div class="auth-branding">
      <div class="logo-initials">
        <span class="rn-r">R</span><span class="rn-n">N</span>
      </div>
      <div class="auth-header">
        <h1>Forgot Password?</h1>
        <p>No worries! Enter your email and we'll send you a link to reset it.</p>
      </div>
    </div>

    <div *ngIf="successMessage" class="success-state animate-fade-in">
      <div class="success-icon">
        <i class="material-icons">mark_email_read</i>
      </div>
      <h3>Check Your Email</h3>
      <p>{{ successMessage }}</p>
      <button class="btn-primary-auth" (click)="successMessage = ''">Resend Email</button>
      <p class="auth-footer-text">
        <a [routerLink]="['/login']">Back to Login</a>
      </p>
    </div>

    <form *ngIf="!successMessage" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">
      
      <div class="form-field" [class.invalid]="email?.invalid && email?.touched">
        <label for="email">Email Address</label>
        <div class="input-wrapper">
          <i class="material-icons">alternate_email</i>
          <input id="email" type="email" formControlName="email" placeholder="name@example.com" />
        </div>
        <div class="field-error" *ngIf="email?.errors && email?.touched">
          <small *ngIf="email?.errors?.['required']">Email is required</small>
          <small *ngIf="email?.errors?.['email']">Please enter a valid email</small>
        </div>
      </div>

      <button type="submit" class="btn-primary-auth" [disabled]="loading || form.invalid">
        <div *ngIf="!loading">Send Reset Link</div>
        <div *ngIf="loading" class="spinner-container">
          <span class="auth-spinner"></span>
          <span>Sending...</span>
        </div>
      </button>

      <p class="auth-footer-text">
        Suddenly remembered? <a [routerLink]="['/login']">Back to Login</a>
      </p>
    </form>
  </div>
</div>
