<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Login to continue your journey.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <div class="form-field" [class.invalid]="email?.invalid && email?.touched">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
        />
        <div class="field-error" *ngIf="email?.errors && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email is required.</span>
          <span *ngIf="email?.errors?.['email']">Enter a valid email.</span>
        </div>
      </div>

      <div class="form-field" [class.invalid]="password?.invalid && password?.touched">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
        />
        <div class="field-error" *ngIf="password?.errors && password?.touched">
          <span *ngIf="password?.errors?.['required']">Password is required.</span>
          <span *ngIf="password?.errors?.['minlength']">
            Password must be at least 6 characters.
          </span>
        </div>
      </div>

      <div class="form-meta">
        <label class="remember-me">
          <input type="checkbox" formControlName="rememberMe" />
          <span>Remember me</span>
        </label>

        <a class="link" [routerLink]="['/forgot-password']">Forgot password?</a>
      </div>

      <button
        type="submit"
        class="btn primary w-100"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <div class="divider">
        <span>or continue with</span>
      </div>

      <div class="social-buttons">
        <button
          type="button"
          class="btn outline"
          (click)="onLoginWithGoogle()"
          [disabled]="loading"
        >
          <span class="icon">G</span>
          <span>Google</span>
        </button>

        <button
          type="button"
          class="btn outline"
          (click)="onLoginWithFacebook()"
          [disabled]="loading"
        >
          <span class="icon">f</span>
          <span>Facebook</span>
        </button>
      </div>

      <p class="auth-footer-text">
        Don't have an account?
        <a class="link" [routerLink]="['/register']">Create one</a>
      </p>

      <p *ngIf="error" class="global-error">
        {{ error }}
      </p>
    </form>
  </div>
</div>
