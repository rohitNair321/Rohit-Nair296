<div class="wrapper">
  <app-navigation [config]="appConfig" (isSidebarCollapsedChange)="initSidebarMenu($event)"></app-navigation>
  <app-sidebar ></app-sidebar>
  <div class="main-content" [class.sidebar-collapsed]="appConfig.appConfiguration.type === 'sidebar' && appConfig.appConfiguration.collapsed" [class.sidebar-expanded]="appConfig.appConfiguration.type === 'sidebar' && !appConfig.appConfiguration.collapsed"
  [class.m-4]="appConfig.appConfiguration.type === 'navbar'">
    <main class="container">
      <router-outlet></router-outlet>
    </main>
    <app-footer></app-footer>
  </div>
</div>
@if (appConfig.appConfiguration.showAgentChat) {
  <app-chat-bot [position]="'bottom-right'" [title]="'AiNg Assistant'" [placeholder]="'Ask about my projects...'">
  </app-chat-bot>
}


<app-christmas-animation></app-christmas-animation>
<app-new-year-animation></app-new-year-animation>
